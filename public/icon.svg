<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Subtle inner highlight -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base shape -->
  <rect width="48" height="48" rx="11" fill="url(#grad)"/>
  <!-- Shine overlay -->
  <rect width="48" height="24" rx="11" fill="url(#shine)"/>
  <rect y="13" width="48" height="11" fill="url(#shine)" opacity="0.5"/>

  <!-- LQ text -->
  <text x="24" y="33" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="17" fill="white" text-anchor="middle" letter-spacing="-0.5">LQ</text>
</svg>
